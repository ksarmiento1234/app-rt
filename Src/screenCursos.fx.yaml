                        OnSelect: |-
                            =Clear(colErroresAñadirTeams);
                            //Agregamos ID de equipo al Curso en el sistema
                            Patch(Curso, LookUp(Curso, ID = _cursoselected.ID), {id_teams: CB_GruposTeams2.Selected.id});
                            
                            //Agregamos a todos los alumnos matriculados al equipo de Teams seleccionado
                            ForAll(Filter(Matricula As M, M.id_curso = _cursoselected.ID), 
                            IfError(GruposdeOffice365.AddMemberToGroup(CB_GruposTeams2.Selected.id, Text(LookUp(Alumno As B, B.DOC = ThisRecord.doc_alumno, B.correo_institucional))), 
                            Collect(colErroresAñadirTeams, ThisRecord), Notify(LookUp(Alumno As B, B.DOC = ThisRecord.doc_alumno, B.nombre_completo) & " fue añadido con éxito!", NotificationType.Success, 1000)));
                            
                            AddOwnersRT.Run(CB_GruposTeams2.Selected.id, UsuariosdeOffice365.UserProfileV2(Text(LookUp(Docente, DOC = _cursoselected.doc_docente, correo_institucional))).id);
                            
                            //Notificamos Errores
                            If(!IsBlank(colErroresAñadirTeams),Notify("No se pudo añadir a los siguientes usuarios: " & Concat(colErroresAñadirTeams,LookUp(Alumno, DOC = ThisRecord.DOC, nombre_completo) & " - "), NotificationType.Error, 20000), Notify("Curso activado con éxito!", NotificationType.Success, 5000));
                            
                            //Cambiar estado de Curso a Activo
                            Patch(Curso, LookUp(Curso, ID = _cursoselected.ID), {estado: "Activo"});
                            
                            Set(_activacioncurso, false);
                            Set(newcurso, false)
                        PressedBorderColor: =App.Theme.Colors.Darker40
                        PressedColor: =Self.Color
                        PressedFill: =RGBA(0,0,0,0.3)
                        Size: =15
                        Text: =""
                        Width: =Parent.Width
                        ZIndex: =3

