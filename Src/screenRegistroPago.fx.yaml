                                                            Toggle1.Checked,
                                                            TI_CuotaInicial.Value,
                                                            LookUp(
                                                                Nivel,
                                                                ID = CB_Curso.Selected.id_nivel
                                                            ).costo
                                                        ) / 1.18
                                                    ),
                                                    exonerado: 0,
                                                    igv: Value(
                                                        If(
                                                            Toggle1.Checked,
                                                            TI_CuotaInicial.Value,
                                                            LookUp(
                                                                Nivel,
                                                                ID = CB_Curso.Selected.id_nivel
                                                            ).costo
                                                        ) * 0.18
                                                    ),
                                                    importe: Value(
                                                        If(
                                                            Toggle1.Checked,
                                                            TI_CuotaInicial.Value,
                                                            LookUp(
                                                                Nivel,
                                                                ID = CB_Curso.Selected.id_nivel
                                                            ).costo
                                                        )
                                                    )
                                                }
                                            ),
                                            "Pago con Promoción",
                                            Collect(
                                                colItemsPago,
                                                {
                                                    num_item: 1,
                                                    descripcion_item: Text(
                                                        If(
                                                            Toggle1.Checked,
                                                            "Adelanto ",
                                                            "Pago "
                                                        ) & CB_Promo.Selected.descripcion
                                                    ),
                                                    base_imponible: If(
                                                        Toggle1.Checked,
                                                        TI_CuotaInicial.Value,
                                                        CB_Promo.Selected.monto
                                                    ) / 1.18,
                                                    exonerado: 0,
                                                    igv: If(
                                                        Toggle1.Checked,
                                                        TI_CuotaInicial.Value,
                                                        CB_Promo.Selected.monto
                                                    ) * 0.18,
                                                    importe: Value(
                                                        If(
                                                            Toggle1.Checked,
                                                            TI_CuotaInicial.Value,
                                                            CB_Promo.Selected.monto
                                                        )
                                                    )
                                                }
