                                            Collect(
                                                colItemsPago,
                                                {
                                                    num_item: 1,
                                                    descripcion_item: Text(
                                                        If(
                                                            Toggle1.Checked,
                                                            "Adelanto ",
                                                            "Pago "
                                                        ) & CB_Curso.Selected.codigo
                                                    ),
