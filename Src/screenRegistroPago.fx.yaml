                                    If(
                                        Value(LB_PagoTotal.Text) > 0,
                                        Set(
                                            _IDPago,
                                            Patch(
                                                Pagos,
                                                Defaults(Pagos),
                                                {
                                                    doc_alumno: _pagoxverificarselected.DOC,
                                                    id_matricula: _IDMatricula,
                                                    pago_descripcion: If(
                                                        RadioGroupCanvas1.Selected.Value = "Pago Normal",
                                                        "Pago " & CB_Curso.Selected.codigo,
                                                        RadioGroupCanvas1.Selected.Value = "Pago con Promoción",
                                                        "Pago " & CB_Promo.Selected.descripcion
                                                    ) & If(
                                                        CheckboxCanvas1.Checked,
                                                        " + Libro Físico " & CB_LibroFisico.Selected.descripcion,
                                                        ""
                                                    ) & If(
                                                        CheckboxCanvas1_1.Checked,
                                                        " + Libro Virtual " & CB_LibroVirtual.Selected.descripcion,
                                                        ""
                                                    ) & If(
                                                        CheckboxCanvas1_6.Checked,
                                                        " + " & If(
                                                            RadioGroupCanvas2.Selected.Value = "Mensual",
                                                            CB_LibroAlquilerMensual.Selected.descripcion,
                                                            RadioGroupCanvas2.Selected.Value = "Con Promoción",
                                                            CB_PromoLibro.Selected.descripcion
                                                        ),
                                                        ""
                                                    ),
                                                    pago_importe: Value(LB_PagoTotal.Text),
                                                    pago_igv: 0,
                                                    pago_tipomoneda: 1,
                                                    pago_creador: User().FullName,
                                                    forma_pago: CB_FormaPago.Selected.ID,
                                                    pago_captura: _pagoxverificarselected.voucher,
                                                    fecha_registro: Now(),
                                                    estado: "Pendiente",
                                                    estado_sunat: "Por Registrar"
                                                }
                                            ).ID
                                        );
                                        //2.1 CREANDO DETALLE DE ITEMS AL PAGO
                                    Clear(colItemsPago);
                                        Switch(
                                            RadioGroupCanvas1.Selected.Value,
